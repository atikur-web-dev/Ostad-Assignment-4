<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Stopwatch</h1>
        <h2 id="time">
            0 Seconds
        </h2>
        <div class="buttons">
            <button id="startBtn">
                Start
            </button>
            <button id="stopBtn">
                Stop
            </button>
            <button id="resetBtn">
                Reset
            </button>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
