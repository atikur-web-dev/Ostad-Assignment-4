<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Student Result Calculator</h1>
        <div class="input-group">
            <label for="bangla">Bangla</label>
            <input type="number" id="bangla" placeholder="Enter Bangla Marks">
        </div>
        <div class="input-group">
            <label for="english">English</label>
            <input type="number" id="english" placeholder="Enter English Marks">
        </div>
        <div class="input-group">
            <label for="math">Math</label>
            <input type="number" id="math" placeholder="Enter Math Marks">
        </div>
        <button id="calculateBtn">
            Calculate Result
        </button>
        <div class="result">
            <p>Total : <span id="total">0</span></p>
            <p>Average : <span id="average">0</span></p>
            <p>Grade : <span id="grade">-</span></p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
